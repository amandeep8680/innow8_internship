<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login_logout</title>
</head>
<body>
    {% if messages %}

    <ul>
        {%for messages in messages %}
        <li>{{messages}}</li>
        {%endfor%}
    </ul>
    {%endif%}
    {%if user.is_authenticated %}
    Logged in as {{user.username}} | <a href="{% url 'logout'%}">logout</a>
    {%else%}
    You are not logged in Bro!!!!!!! | <a href="{% url 'register'%}">Register</a>

        {%endif%}

    <hr>

    {%block content%}
    {%endblock%}
</body>
</html>
